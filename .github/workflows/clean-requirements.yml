name: Clean Requirements

on:
  workflow_dispatch:   # Manual trigger
  push:
    branches:
      - '**'          # Run on all branches

jobs:
  clean-requirements:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Step 3: Install required tools
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-tools pipreqs

      # Step 4: Generate requirements.in from imports in code
      - name: Scan code and generate requirements.in
        run: |
          pipreqs . --force --ignore .venv,__pycache__,tests --savepath requirements.in

      # Step 5: Compile pinned requirements.txt
      - name: Compile pinned requirements.txt
        run: |
          pip-compile requirements.txt --output-file requirements.text --upgrade

      # Step 6: Show cleaned requirements (optional)
      - name: Show requirements.txt
        run: cat requirements.txt

      # Step 7: Commit updated requirements.txt
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-clean requirements.txt"
          branch: ${{ github.ref_name }}  # commit to current branch
          file_pattern: requirements.txt
